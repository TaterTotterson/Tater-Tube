name: Bug report
description: Report something broken in Tater Tube
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Tater Tube targets Raspberry Pi appliance images, Argon IR remote input, Emby/Jellyfin and Plex playback, OTA, Public Access, Game Center, and PC Link.
  - type: checkboxes
    id: preflight
    attributes:
      label: Before you file
      options:
        - label: I checked the docs and existing [issues](https://github.com/TaterTotterson/Tater-Tube/issues) and didn't find this.
          required: true
  - type: dropdown
    id: module
    attributes:
      label: Area / module
      description: Which part of Tater Tube does this affect?
      options:
        - Local Files module
        - Video on Demand module (Emby/Jellyfin)
        - Tape Deck module
        - Public Access module
        - Game Center module
        - PC Link module
        - App shell (browsing, settings, navigation)
        - Build (compiling from source)
        - Install / update / Pi image
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Raspberry Pi 4
        - Raspberry Pi 5
        - Local development machine
    validations:
      required: true
  - type: dropdown
    id: display
    attributes:
      label: Display & output
      description: Which display path are you using?
      options:
        - CRT via composite (NTSC)
        - CRT via composite (PAL)
        - HDMI
    validations:
      required: true
  - type: dropdown
    id: install_method
    attributes:
      label: Install method
      options:
        - Ready-to-flash Raspberry Pi image
        - Release install.sh (Raspberry Pi)
        - Built from source
    validations:
      required: true
  - type: input
    id: mpv_version
    attributes:
      label: mpv version
      description: First line of `mpv --version`. Playback issues often trace back to this.
      placeholder: "mpv 0.xx.0"
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do, step by step?
      placeholder: |
        1. Open the Video on Demand module
        2. Select a movie
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs. actual
      description: What did you expect to happen, and what actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / terminal output
      description: Any output from running the app. This is rendered as code, so no backticks needed.
      render: shell
