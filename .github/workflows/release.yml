name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # Linux arm64 app tarball — targets Raspberry Pi OS Trixie (Debian 13).
  # ──────────────────────────────────────────────────────────────────────────────
  build-linux-arm64:
    name: Linux arm64
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Validate generated helpers
        run: bash scripts/check-generated-helpers.sh

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            bsdextrautils \
            cmake \
            qt6-base-dev \
            qt6-declarative-dev \
            libqt6svg6 \
            qt6-svg-dev \
            qml6-module-qtquick \
            qml6-module-qtquick-controls \
            qml6-module-qtquick-window \
            libdrm-dev \
            libglew-dev \
            libopengl-dev \
            libssl-dev \
            libsdl2-dev \
            libsdl2-net-dev \
            git \
            ninja-build \
            libusb-dev \
            libusb-1.0-0-dev \
            libpng-dev \
            libzip-dev \
            zipcmp \
            zipmerge \
            ziptool \
            nlohmann-json3-dev \
            libtinyxml2-dev \
            libspdlog-dev \
            libogg-dev \
            libopus-dev \
            libopusfile-dev \
            libvorbis-dev \
            lsb-release \
            libevdev-dev \
            libavcodec-dev \
            libavutil-dev \
            libcurl4-openssl-dev \
            libexpat1-dev \
            libavahi-client-dev \
            libasound2-dev \
            libdbus-1-dev \
            libdecor-0-dev \
            libfreetype6-dev \
            libglu1-mesa-dev \
            libgtk-3-dev \
            libncurses5-dev \
            libpipewire-0.3-dev \
            libpulse-dev \
            libudev-dev \
            libunwind-dev \
            libvulkan-dev \
            libwayland-dev \
            libx11-xcb-dev \
            libxcursor-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            libxss-dev \
            python3-markupsafe \
            wayland-protocols \
            zlib1g-dev

      - name: Install Rust toolchain for ARM64 disc support
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="${GITHUB_WORKSPACE}/install/usr/local"

      - name: Build
        run: cmake --build build --parallel

      - name: Install
        run: cmake --install build

      - name: Build bundled Moonlight SDL runtime
        run: ./scripts/build-moonlight-sdl.sh "${GITHUB_WORKSPACE}/install/usr/local/share/240mp/vendor/moonlight-sdl"

      - name: Build bundled sm64coopdx port engine
        run: ./scripts/build-sm64coopdx-port.sh "${GITHUB_WORKSPACE}/install/usr/local/share/240mp/vendor/ports/sm64coopdx"

      - name: Build bundled 2 Ship 2 Harkinian port engine
        run: ./scripts/build-2ship2harkinian-port.sh "${GITHUB_WORKSPACE}/install/usr/local/share/240mp/vendor/ports/2ship2harkinian"

      - name: Build bundled Ship of Harkinian port engine
        run: ./scripts/build-shipwright-port.sh "${GITHUB_WORKSPACE}/install/usr/local/share/240mp/vendor/ports/shipwright"

      - name: Build bundled SpaghettiKart port engine
        run: ./scripts/build-spaghettikart-port.sh "${GITHUB_WORKSPACE}/install/usr/local/share/240mp/vendor/ports/spaghettikart"

      - name: Build bundled Starship port engine
        run: ./scripts/build-starship-port.sh "${GITHUB_WORKSPACE}/install/usr/local/share/240mp/vendor/ports/starship"

      - name: Build bundled Dusklight port engine
        run: DUSKLIGHT_BUILD_JOBS=3 ./scripts/build-dusklight-port.sh "${GITHUB_WORKSPACE}/install/usr/local/share/240mp/vendor/ports/dusklight"

      - name: Create tarball
        run: |
          cd "${GITHUB_WORKSPACE}/install"
          tar -czf "${GITHUB_WORKSPACE}/Tater-Tube-${{ github.ref_name }}-linux-arm64.tar.gz" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: tarball-linux-arm64
          path: "Tater-Tube-*-linux-arm64.tar.gz"
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────────
  # Ready-to-flash Raspberry Pi image — built with pi-gen on the arm64 runner.
  # ──────────────────────────────────────────────────────────────────────────────
  build-pi-image:
    name: Raspberry Pi image (${{ matrix.image_profile }})
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        image_profile:
          - crt-ntsc
          - crt-pal
          - pi5-hdmi-auto

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Validate generated helpers
        run: bash scripts/check-generated-helpers.sh

      - name: Build image
        env:
          PI_IMAGE_NAME: tater-tube-${{ github.ref_name }}-${{ matrix.image_profile }}
          PI_IMAGE_PROFILE: ${{ matrix.image_profile }}
          PI_ENABLE_SSH: "1"
          PI_FIRST_USER_NAME: tater
          PI_FIRST_USER_PASS: pi
        run: ./scripts/build-pi-image.sh

      - name: Prepare image artifacts
        run: |
          set -euo pipefail
          mkdir -p pi-image-artifacts
          cp .cache/pi-gen-arm64/deploy/image_*.img.xz pi-image-artifacts/
          cp .cache/pi-gen-arm64/deploy/*.info pi-image-artifacts/ || true
          (
            cd pi-image-artifacts
            sha256sum image_*.img.xz > SHA256SUMS.txt
            ls -lh
          )

      - name: Upload image artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: pi-image-${{ matrix.image_profile }}
          path: pi-image-artifacts/*
          if-no-files-found: error
          compression-level: 0

  # ──────────────────────────────────────────────────────────────────────────────
  # Publish GitHub Release
  # ──────────────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-linux-arm64, build-pi-image]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: artifacts

      - name: Generate release notes
        run: |
          set -euo pipefail
          shopt -s nullglob

          previous_tag="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
          app_assets=(artifacts/tarball-linux-arm64/Tater-Tube-*-linux-arm64.tar.gz)
          image_assets=(artifacts/pi-image-*/image_*.img.xz)
          release_highlights="$(python3 -c 'import json, pathlib; manifest=json.loads(pathlib.Path("update-manifest.json").read_text()); print("\n".join("- " + str(note).strip() for note in manifest.get("notes", []) if str(note).strip()))')"

          app_asset_name="$(basename "${app_assets[0]}")"
          download_base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}"

          if [ "${#image_assets[@]}" -eq 0 ]; then
            echo "No Raspberry Pi image assets found." >&2
            exit 1
          fi

          : > SHA256SUMS.txt
          for image_asset in "${image_assets[@]}"; do
            sha256sum "$image_asset" | awk -v name="$(basename "$image_asset")" '{ print $1 "  " name }' >> SHA256SUMS.txt
          done

          {
            if [ -n "$release_highlights" ]; then
              echo "### Highlights"
              echo
              printf '%s\n' "$release_highlights"
              echo
            fi
            echo "### Downloads"
            echo
            echo "| Platform | File |"
            echo "|---|---|"
            for image_asset in "${image_assets[@]}"; do
              image_asset_name="$(basename "$image_asset")"
              image_label="Ready-to-flash Raspberry Pi OS image"
              case "$image_asset_name" in
                *crt-ntsc*) image_label="Ready-to-flash Raspberry Pi OS image (NTSC composite)" ;;
                *crt-pal*) image_label="Ready-to-flash Raspberry Pi OS image (PAL composite)" ;;
                *pi5-hdmi-auto*) image_label="Ready-to-flash Raspberry Pi OS image (Pi 5 HDMI auto)" ;;
              esac
              echo "| ${image_label} | [\`${image_asset_name}\`](${download_base}/${image_asset_name}) |"
            done
            echo "| Image checksums | [\`SHA256SUMS.txt\`](${download_base}/SHA256SUMS.txt) |"
            echo "| Raspberry Pi OS Trixie app update (arm64) | [\`${app_asset_name}\`](${download_base}/${app_asset_name}) |"
            echo "| Installer | [\`install.sh\`](${download_base}/install.sh) |"
            echo
            if [ -n "$previous_tag" ]; then
              echo "### Changes since ${previous_tag}"
              echo
              git log --pretty=format:'- %s (`%h`)' "${previous_tag}..${GITHUB_REF_NAME}"
              echo
            else
              echo "### Changes"
              echo
              git log --pretty=format:'- %s (`%h`)' "${GITHUB_REF_NAME}"
              echo
            fi
            echo
            echo "### Install Instructions"
            echo
            echo "- Ready-to-flash image: download the NTSC composite, PAL composite, or Pi 5 HDMI auto image asset, flash it with Raspberry Pi Imager or Balena Etcher, then boot the Pi."
            echo "- Raspberry Pi OS Trixie app update: [Instructions](INSTALL.md#update-an-existing-tater-tube-image)"
          } > release-notes.md

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Tater Tube ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            artifacts/tarball-linux-arm64/*.tar.gz
            artifacts/pi-image-*/*.img.xz
            artifacts/pi-image-*/*.info
            SHA256SUMS.txt
            scripts/install.sh
          body_path: release-notes.md
